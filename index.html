<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Mercadão</title>
        <meta name="description" content="Mercadão - Seu mercado de confiança">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="assets/css/global/reset.css">
        <link rel="stylesheet" href="assets/css/global/global.css">
        <link rel="stylesheet" href="assets/css/layout/header.css">
        <link rel="stylesheet" href="assets/css/style/index.css">
    </head>
    <body>
        <header>
            <nav class="header__nav" aria-label="Cabeçalho de navegação principal do Mercadão">
                <div class="header__nav-logo" aria-label="Logo do Mercadão">
                    <a class="home-link" href="index.html">
                        <img class="logo-image" src="assets/images/logo.png" alt="Mercadão Logo">
                        <span class="logo-title">Mercadão</span>
                    </a>
                </div>

                <div class="header__nav-search" role="search" aria-label="Área de pesquisa">
                    <form class="search-form" action="search.html" method="GET">
                        <label class="visually-hidden" for="query">Barra de pesquisa</label>

                        <button class="search-button" type="submit">
                            <img class="search-icon" src="assets/icons/Search.svg" alt="Icone de busca">
                        </button>

                        <input class="search-input" type="text" name="query" placeholder="Buscar produtos...">
                    </form>
                </div>

                <div class="header__nav-links" role="navigation" aria-label="Links de navegação principal">
                    <a class="nav-link disabled-link" href="pages/category/category.html">
                        <img class="category-icon nav-icon" src="assets/icons/Categorias.svg" alt="Icone de categoria">
                        <span class="nav-category-text">Categorias</span>
                        <img class="dropdown-icon" src="assets/icons/Dropdown.svg" alt="icone de dropdown">
                    </a>

                    <a class="nav-link disabled-link" href="pages/cart/cart.html">
                        <img class="cart-icon nav-icon" src="assets/icons/Cart.svg" alt="Icone de carrinho">
                        <span class="cart-count" aria-label="Número de itens no carrinho">0</span>
                    </a>
                </div>

                <div class="header__nav-user" role="navigation" aria-label="Área de navegação do usuário">
                    <a class="nav-link" href="pages/login/login.html">
                        <img class="account-icon" src="assets/icons/Conta.svg" alt="Icone de usuário">
                        
                        <div class="user-text">
                            <span class="user-greeting">Minha conta</span>
                            <span class="user-action">Entrar</span>
                        </div>
                    </a>
                </div>

                <button class="mobile-menu-button" aria-label="Menu de navegação móvel">
                    <img class="mobile-menu-icon" src="assets/icons/Menu.svg" alt="Icone de menu">
                </button>
            </nav>
        </header>

        <main class="home">
            <section class="featured-products">
                <div class="featured-products__header">
                    <div class="featured-products__title-group">
                        <img src="#" alt="">
                        <h1 class="featured-products-title">
                            PRINCIPAIS
                        </h1>
                    </div>

                    <div class="featured-products__info">
                        <p class="featured-products__subtitle">
                            Os produtos mais vendidos
                        </p>

                        <a href="#" class="featured-products__link">
                            Ver mais
                        </a>
                    </div>
                </div>

                <div class="featured-products__list">
                    <!-- SO EXEMPLO, DEPOIS JS -->
                    <article class="product-card">
                        <img class="product-card__image" src="#" alt="Colocar com js">
                        <h2 class="product-card__title">Mouse Gamer</h2>
                        <p class="product-card__subtitle">RGB</p>
                        <span class="product-card__price">R$ 89,90</span>
                        <button class="product-card__button">
                            <img class="product-card__button-icon" src="#">
                            <span clas="product-card__button-text">Comprar</span>
                        </button>
                    </article>
                </div>
            </section>
        </main>

        <script src="assets/js/block-link.js" async defer></script>
    </body>
</html>
